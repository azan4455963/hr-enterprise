name: Deploy to Firebase Hosting

# Auto-build the Flutter web app and deploy it to Firebase Hosting on every
# push to main. Requires a repo secret FIREBASE_SERVICE_ACCOUNT containing a
# Firebase service-account JSON (see README/setup notes).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Firebase secrets file (gitignored)
        env:
          FIREBASE_SECRETS_DART: ${{ secrets.FIREBASE_SECRETS_DART }}
        run: printf '%s' "$FIREBASE_SECRETS_DART" > lib/firebase_secrets.dart

      - name: Build web
        run: flutter build web --release

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: hr-enterprise-92fac
          channelId: live
