name: Deploy to Firebase Hosting

# Auto-build the Flutter web app and deploy it to Firebase Hosting on every
# push to main. Requires a repo secret FIREBASE_SERVICE_ACCOUNT containing a
# Firebase service-account JSON (see README/setup notes).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Firebase secrets file (gitignored)
        env:
          FIREBASE_SECRETS_DART: ${{ secrets.FIREBASE_SECRETS_DART }}
        run: printf '%s' "$FIREBASE_SECRETS_DART" > lib/firebase_secrets.dart

      - name: Build web
        # Unique build number per run so version.json changes every deploy,
        # which the in-app auto-updater detects.
        run: flutter build web --release --build-number ${{ github.run_number }}

      - name: Deploy to Firebase Hosting (live)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-sa.json
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npm install -g firebase-tools
          set +e
          OUT=$(firebase deploy --only hosting --project hr-enterprise-92fac --non-interactive 2>&1)
          CODE=$?
          echo "$OUT"
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
          if [ $CODE -ne 0 ]; then
            if echo "$OUT" | grep -q "is the current active version"; then
              echo "::notice::No content changes — site already up to date. Treating as success."
              exit 0
            fi
            exit $CODE
          fi
