<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="hr_enterprise">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>hr_enterprise</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    // Load Flutter WITHOUT its own (stale-prone) service worker.
    _flutter.loader.load();
  </script>

  <script>
    // Register a tiny network-first service worker. This makes the app
    // installable as a PWA (Install button in Chrome/Edge) while never serving
    // a stale build — every request hits the network first.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('flutter_pwa_sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
