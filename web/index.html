<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="hr_enterprise">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>hr_enterprise</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Always load the freshest build. Flutter's service worker is known to
    // serve a stale main.dart.js after a new deploy, so we unregister any
    // existing worker and clear its caches, then load Flutter WITHOUT
    // registering a new one (see _flutter.loader.load() below — no
    // serviceWorker setting is passed). Combined with the no-cache headers in
    // firebase.json, every visit gets the latest code.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (reg) { reg.unregister(); });
      }).catch(function () {});
    }
    if (window.caches && caches.keys) {
      caches.keys().then(function (keys) {
        keys.forEach(function (key) { caches.delete(key); });
      }).catch(function () {});
    }
  </script>

  {{flutter_js}}
  {{flutter_build_config}}

  <script>
    // No serviceWorkerSettings => Flutter does not register a service worker.
    _flutter.loader.load();
  </script>
</body>
</html>
